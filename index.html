<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            .card { padding: 18px 14px; }

        ::-webkit-scrollbar-track { background: #0a0a1a; }

    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="light-ray"></div>
        <h1>⚜️ معجزه الهی</h1>
        <div class="sub">نور از آسمان ، هدیه‌ای برای زمین</div>
    </div>

    <div class="card">
        <div class="card-title"><span>🕊️</span> زمان مقدس</div>
        <div class="clock-wrap">
            <div class="clock-item"><span class="num" id="hour">00</span><span class="label">ساعت</span></div>

            <span id="dateShamsi">☀️ -- --</span>
            <span id="dateMiladi">🌍 -- --</span>

        </div>
    </div>

    <div class="card">
        <div class="card-title"><span>🔢</span> حساب ابجد اسم</div>

        <label>نوع ابجد</label>
        <select id="abjadType">
            <option value="kabir">ابجد کبیر (استاندارد)</option>
            <option value="saghir">ابجد صغیر (ریشه عدد)</option>
        </select>
        <button class="btn" onclick="calcAbjad()">✨ محاسبه کن</button>

            <span style="color:#8a7a5e;">نتیجه اینجا نمایان میشود...</span>

    <div class="card">
        <div class="card-title"><span>📅</span> تبدیل تاریخ</div>
        <div class="row-2col">
            <div>
                <label>سال</label>
                <input type="number" id="convYear" placeholder="مثلاً 1405" />
            </div>
            <div>
                <label>ماه</label>
                <input type="number" id="convMonth" placeholder="1-12" />
            </div>
            <div>
                <label>روز</label>
                <input type="number" id="convDay" placeholder="1-31" />
            </div>
            <div>
                <label>نوع تاریخ ورودی</label>
                <select id="convType">
                    <option value="shamsi">شمسی</option>
                    <option value="miladi">میلادی</option>
                    <option value="ghamari">قمری</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="convertDate()">🔄 تبدیل کن</button>
        <div class="result-box" id="dateResult">
            <span style="color:#8a7a5e;">نتیجه تبدیل...</span>
        </div>

    <div class="brand-footer">
        <img src="https://cdn.imgurl.ir/uploads/r8816_file_00000000121472468a639ee04338d364.png" alt="لوگو" class="logo-img" />
        <div class="english-sign">ShKiLLeR</div>
        <div class="persian-dedication">تقدیم با <span class="heart">🤍</span> به کانال معجزه الهی نرجس نور .</div>
    </div>

    <div style="text-align:center; font-size:0.7rem; color:#4a3f2e; padding:20px 0 10px; border-top:1px solid rgba(255,215,0,0.04);">
        ✦ نور از بالاست ✦
    </div>
</div>

<script>
// ================================================================
//  نام ماه‌ها و روزهای هفته
// ================================================================
var PERSIAN_MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
var GREGORIAN_MONTHS = ['ژانویه','فوریه','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپتامبر','اکتبر','نوامبر','دسامبر'];
var GREGORIAN_WEEKDAYS = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
var ISLAMIC_MONTHS = ['محرم','صفر','ربیع‌الاول','ربیع‌الثانی','جمادی‌الاول','جمادی‌الثانی','رجب','شعبان','رمضان','شوال','ذی‌القعده','ذی‌الحجه'];

// ================================================================
//  ۱. تبدیل شمسی → میلادی (الگوریتم جلالی - دقیق)
// ================================================================
function toGregorian(jy, jm, jd) {
    var gy, gm, gd, days;
    jy += 1595;
    days = -355668 + (365 * jy) + (Math.floor(jy / 33) * 8)
         + Math.floor(((jy % 33) + 3) / 4) + jd
         + ((jm < 7) ? (jm - 1) * 31 : ((jm - 7) * 30) + 186);

    gy = 400 * Math.floor(days / 146097);
    days -= 146097 * Math.floor(days / 146097);

    if (days > 36524) {
        days--;
        gy += 100 * Math.floor(days / 36524);
        days -= 36524 * Math.floor(days / 36524);
        if (days >= 365) days++;
    }

    gy += 4 * Math.floor(days / 1461);
    days -= 1461 * Math.floor(days / 1461);

    if (days > 365) {
        gy += Math.floor((days - 1) / 365);
        days = (days - 1) - 365 * Math.floor((days - 1) / 365);
    }

    gd = days + 1;
    var isLeap = ((gy % 4 === 0 && gy % 100 !== 0) || (gy % 400 === 0));
    var sal_a = [0, 31, isLeap ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

    gm = 0;
    for (var i = 0; i < 13 && gd > sal_a[i]; i++) {
        gd -= sal_a[i];
        gm++;
    }

    return { year: gy, month: gm, day: gd };
}

// ================================================================
//  ۲. تبدیل میلادی → شمسی (الگوریتم جلالی - دقیق)
// ================================================================
function toJalaali(gy, gm, gd) {
    var g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
    var gy2 = (gm > 2) ? (gy + 1) : gy;
    var days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4)
             - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400)
             + gd + g_d_m[gm - 1];
    var jy = -1595 + (33 * Math.floor(days / 12053));
    days %= 12053;
    jy += 4 * Math.floor(days / 1461);
    days %= 1461;
    if (days > 365) {
        jy += Math.floor((days - 1) / 365);
        days = (days - 1) % 365;
    }
    var jm, jd;
    if (days < 186) {
        jm = 1 + Math.floor(days / 31);
        jd = 1 + (days % 31);
    } else {
        jm = 7 + Math.floor((days - 186) / 30);
        jd = 1 + ((days - 186) % 30);
    }
    return { year: jy, month: jm, day: jd };
}

// ================================================================
//  ۳. Julian Day Number
// ================================================================
function toJDN(gy, gm, gd) {
    var a = Math.floor((14 - gm) / 12);
    var y = gy + 4800 - a;
    var m = gm + 12 * a - 3;
    return gd + Math.floor((153 * m + 2) / 5) + 365 * y
         + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
}

function fromJDN(jd) {
    var a = jd + 32044;
    var b = Math.floor((4 * a + 3) / 146097);
    var c = a - Math.floor((146097 * b) / 4);
    var d = Math.floor((4 * c + 3) / 1461);
    var e = c - Math.floor((1461 * d) / 4);
    var m = Math.floor((5 * e + 2) / 153);
    var day = e - Math.floor((153 * m + 2) / 5) + 1;
    var month = m + 3 - 12 * Math.floor(m / 10);
    var year = 100 * b + d - 4800 + Math.floor(m / 10);
    return { year: year, month: month, day: day };
}

// ================================================================
//  ۴. تبدیل میلادی ↔ قمری (تقویم جدولی - دقیق)
// ================================================================
var ISLAMIC_LEAP = [2, 5, 7, 10, 13, 16, 18, 21, 24, 26, 29];
var ISLAMIC_EPOCH = 1948440;

function isIslamicLeap(iy) {
    return ISLAMIC_LEAP.indexOf(((iy - 1) % 30) + 1) >= 0;
}

function islamicMonthDays(iy, im) {
    if (im === 12) return isIslamicLeap(iy) ? 30 : 29;
    return (im % 2 === 1) ? 30 : 29;
}

function gregorianToIslamic(gy, gm, gd) {
    var jd = toJDN(gy, gm, gd);
    var l = jd - ISLAMIC_EPOCH;
    var cycles = Math.floor(l / 10631);
    var remaining = l - cycles * 10631;
    var iy = cycles * 30 + 1;
    for (var y = 1; y <= 30; y++) {
        var yearLen = isIslamicLeap(iy) ? 355 : 354;
        if (remaining < yearLen) break;
        remaining -= yearLen;
        iy++;
    }
    var im = 1;
    for (var m = 1; m <= 12; m++) {
        var monthLen = islamicMonthDays(iy, m);
        if (remaining < monthLen) break;
        remaining -= monthLen;
        im++;
    }
    return { year: iy, month: im, day: remaining + 1 };
}

function islamicToGregorian(iy, im, id) {
    var days = 0;
    var cycles = Math.floor((iy - 1) / 30);
    days += cycles * 10631;
    var yearInCycle = ((iy - 1) % 30) + 1;
    for (var y = 1; y < yearInCycle; y++) {
        days += isIslamicLeap(cycles * 30 + y) ? 355 : 354;
    }
    for (var m = 1; m < im; m++) {
        days += islamicMonthDays(iy, m);
    }
    days += id - 1;
    return fromJDN(ISLAMIC_EPOCH + days);
}

// ================================================================
//  ۵. ابجد
// ================================================================
var ABJAD_KABIR = {
    'ا':1,'ب':2,'ج':3,'د':4,'ه':5,'و':6,'ز':7,'ح':8,'ط':9,
    'ی':10,'ک':20,'ل':30,'م':40,'ن':50,'س':60,'ع':70,'ف':80,'ص':90,
    'ق':100,'ر':200,'ش':300,'ت':400,'ث':500,'خ':600,'ذ':700,'ض':800,'ظ':900,'غ':1000,
    'گ':20,'چ':3,'پ':2,'ژ':7,'آ':1,'ة':5
};

function rootNumber(n) {
    while (n >= 10) {
        var s = 0;
        while (n > 0) { s += n % 10; n = Math.floor(n / 10); }
        n = s;
    }
    return n;
}

function calcAbjad() {
    var input = document.getElementById('abjadInput').value.trim();
    var type = document.getElementById('abjadType').value;
    var resultBox = document.getElementById('abjadResult');
    if (!input) {
        resultBox.innerHTML = '<span style="color:#b87a5a;">❌ لطفاً یک نام یا کلمه وارد کن</span>';
        return;
    }
    var total = 0;
    var details = [];
    for (var i = 0; i < input.length; i++) {
        var ch = input[i];
        var val = ABJAD_KABIR[ch] || 0;
        if (val === 0) {
            if (ch.trim() !== '') details.push('«' + ch + '» = ❓');
            continue;
        }
        var dv = (type === 'saghir') ? rootNumber(val) : val;
        total += dv;
        details.push('«' + ch + '» = ' + dv);
    }
    if (type === 'saghir') total = rootNumber(total);
    var tl = (type === 'kabir') ? 'ابجد کبیر' : 'ابجد صغیر (ریشه)';
    resultBox.innerHTML = '<div><span class="highlight">' + total + '</span><span style="color:#c4b08a; margin-right:10px;">مجموع ' + tl + '</span><span class="detail">' + details.join(' ، ') + '</span></div>';
}

// ================================================================
//  ۶. تبدیل تاریخ
// ================================================================
function toPersianDigits(n) {
    var pd = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
    return String(n).replace(/\d/g, function(d) { return pd[parseInt(d)]; });
}

function convertDate() {
    var year = parseInt(document.getElementById('convYear').value);
    var month = parseInt(document.getElementById('convMonth').value);
    var day = parseInt(document.getElementById('convDay').value);
    var type = document.getElementById('convType').value;
    var resultBox = document.getElementById('dateResult');

    if (!year || !month || !day) {
        resultBox.innerHTML = '<span style="color:#b87a5a;">❌ لطفاً سال، ماه و روز را کامل وارد کن</span>';
        return;
    }
    if (month < 1 || month > 12) {
        resultBox.innerHTML = '<span style="color:#b87a5a;">❌ ماه باید بین ۱ تا ۱۲ باشد</span>';
        return;
    }
    if (day < 1 || day > 31) {
        resultBox.innerHTML = '<span style="color:#b87a5a;">❌ روز باید بین ۱ تا ۳۱ باشد</span>';
        return;
    }

    var shamsi, miladi, ghamari, gWeekday;

    try {
        if (type === 'shamsi') {
            // شمسی → میلادی → قمری
            miladi = toGregorian(year, month, day);
            ghamari = gregorianToIslamic(miladi.year, miladi.month, miladi.day);
            shamsi = { year: year, month: month, day: day };
            gWeekday = toJDN(miladi.year, miladi.month, miladi.day) % 7;

        } else if (type === 'miladi') {
            // میلادی → شمسی + قمری
            shamsi = toJalaali(year, month, day);
            ghamari = gregorianToIslamic(year, month, day);
            miladi = { year: year, month: month, day: day };
            gWeekday = toJDN(year, month, day) % 7;

        } else {
            // قمری → میلادی → شمسی
            miladi = islamicToGregorian(year, month, day);
            shamsi = toJalaali(miladi.year, miladi.month, miladi.day);
            ghamari = { year: year, month: month, day: day };
            gWeekday = toJDN(miladi.year, miladi.month, miladi.day) % 7;
        }

        // اعتبارسنجی نهایی
        if (!shamsi || !miladi || !ghamari ||
            isNaN(shamsi.year) || isNaN(miladi.year) || isNaN(ghamari.year)) {
            resultBox.innerHTML = '<span style="color:#b87a5a;">❌ تاریخ وارد شده نامعتبر است</span>';
            return;
        }

        var weekdayName = GREGORIAN_WEEKDAYS[gWeekday] || '';

        resultBox.innerHTML =
            '<div class="date-result-grid">' +
                '<div class="date-result-item">' +
                    '<div class="dr-label" style="color:#ffd700;">☀️ شمسی</div>' +
                    '<div class="dr-value" style="color:#f5edd6;">' +
                        toPersianDigits(shamsi.day) + ' ' +
                        (PERSIAN_MONTHS[shamsi.month - 1] || '--') + ' ' +
                        toPersianDigits(shamsi.year) +
                    '</div>' +
                '</div>' +
                '<div class="date-result-item">' +
                    '<div class="dr-label" style="color:#88ccff;">🌍 میلادی</div>' +
                    '<div class="dr-value" style="color:#f5edd6;">' +
                        toPersianDigits(miladi.day) + ' ' +
                        (GREGORIAN_MONTHS[miladi.month - 1] || '--') + ' ' +
                        toPersianDigits(miladi.year) +
                    '</div>' +
                '</div>' +
                '<div class="date-result-item">' +
                    '<div class="dr-label" style="color:#66dd88;">🌙 قمری</div>' +
                    '<div class="dr-value" style="color:#f5edd6;">' +
                        toPersianDigits(ghamari.day) + ' ' +
                        (ISLAMIC_MONTHS[ghamari.month - 1] || '--') + ' ' +
                        toPersianDigits(ghamari.year) +
                    '</div>' +
                '</div>' +
                '<div style="text-align:center; margin-top:4px;">' +
                    '<span style="font-size:0.8rem; color:#8a7a5e;">📅 ' + weekdayName + '</span>' +
                '</div>' +
            '</div>';

    } catch (e) {
        resultBox.innerHTML = '<span style="color:#b87a5a;">❌ خطا: تاریخ وارد شده نامعتبر است</span>';
    }
}

// ================================================================
//  ۷. ساعت و تاریخ لحظه‌ای
// ================================================================
function updateClock() {
    var now = new Date();
    document.getElementById('hour').textContent = String(now.getHours()).padStart(2, '0');
    document.getElementById('minute').textContent = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('second').textContent = String(now.getSeconds()).padStart(2, '0');

    var shamsiFormatter = new Intl.DateTimeFormat('fa-IR', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
    document.getElementById('dateShamsi').innerHTML = '☀️ ' + shamsiFormatter.format(now);

    var gy = now.getFullYear();
    var gm = now.getMonth() + 1;
    var gd = now.getDate();
    var gWeekday = now.getDay();
    document.getElementById('dateMiladi').innerHTML =
        '🌍 ' + toPersianDigits(gd) + ' ' + GREGORIAN_MONTHS[gm - 1] + ' ' + toPersianDigits(gy) + ' (' + GREGORIAN_WEEKDAYS[gWeekday] + ')';

    var gh = gregorianToIslamic(gy, gm, gd);
    document.getElementById('dateGhamari').innerHTML =
        '🌙 ' + toPersianDigits(gh.day) + ' ' + ISLAMIC_MONTHS[gh.month - 1] + ' ' + toPersianDigits(gh.year);
}

updateClock();
setInterval(updateClock, 1000);

document.getElementById('abjadInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') calcAbjad();
});
document.querySelectorAll('#convYear, #convMonth, #convDay').forEach(function(el) {
    el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') convertDate();
    });
});
</script>
